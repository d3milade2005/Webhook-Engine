services:
  postgres:
    image: "postgres:16"
    container_name: webhook_engine_postgres
    environment:
      POSTGRES_DB: ${WEBHOOK_ENGINE_DB_NAME}
      POSTGRES_USER: ${WEBHOOK_ENGINE_DB_USER}
      POSTGRES_PASSWORD: ${WEBHOOK_ENGINE_DB_PASSWORD}
    ports:
      - "${WEBHOOK_ENGINE_DB_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WEBHOOK_ENGINE_DB_USER} -d ${WEBHOOK_ENGINE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: "redis:7"
    container_name: webhook_engine_redis
    ports:
      - "${APP_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    container_name: webhook_engine_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 10

  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webhook_engine_app
    environment:
      WEBHOOK_ENGINE_DB_HOST: postgres
      WEBHOOK_ENGINE_DB_PORT: 5432
      WEBHOOK_ENGINE_DB_NAME: ${WEBHOOK_ENGINE_DB_NAME}
      WEBHOOK_ENGINE_DB_USER: ${WEBHOOK_ENGINE_DB_USER}
      WEBHOOK_ENGINE_DB_PASSWORD: ${WEBHOOK_ENGINE_DB_PASSWORD}
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: 6379
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      API_KEYS: ${API_KEYS}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  dead-letter-analyzer:
    build:
      context: ./dead-letter-analyzer
      dockerfile: Dockerfile
    container_name: webhook_engine_analyzer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${WEBHOOK_ENGINE_DB_NAME}
      DB_USER: ${WEBHOOK_ENGINE_DB_USER}
      DB_PASSWORD: ${WEBHOOK_ENGINE_DB_PASSWORD}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
  kafka_data: